name: Deploy HTML to GitHub Pages

# Publishes the self-contained single-file UI (frontend/index.html) to GitHub Pages.
# The page runs in demo mode by default; point it at a backend/Ollama via the Settings panel.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (index.html at root)
        run: |
          mkdir -p _site
          cp frontend/index.html _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
